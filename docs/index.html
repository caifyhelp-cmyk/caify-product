<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Caify 설치</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f7f7f7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 40px 32px;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      text-align: center;
    }
    .logo {
      width: 72px;
      height: 72px;
      background: #03C75A;
      border-radius: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }
    .logo svg { width: 40px; height: 40px; fill: #fff; }
    h1 { font-size: 24px; font-weight: 700; color: #111; margin-bottom: 8px; }
    .subtitle { font-size: 14px; color: #888; margin-bottom: 32px; }
    .btn {
      display: block;
      width: 100%;
      padding: 16px;
      background: #03C75A;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s;
    }
    .btn:hover { background: #02b050; }
    .btn:active { background: #029e47; }
    .steps {
      margin-top: 32px;
      text-align: left;
    }
    .steps-title {
      font-size: 13px;
      font-weight: 600;
      color: #555;
      margin-bottom: 12px;
    }
    .step {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 12px;
    }
    .step-num {
      min-width: 24px;
      height: 24px;
      background: #f0f0f0;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: #555;
    }
    .step-text { font-size: 13px; color: #444; line-height: 1.5; padding-top: 3px; }
    .step-text b { color: #111; }
    .notice {
      margin-top: 24px;
      padding: 14px;
      background: #fffbec;
      border-radius: 10px;
      font-size: 12px;
      color: #856a00;
      text-align: left;
      line-height: 1.6;
    }
    .downloading {
      display: none;
      margin-top: 16px;
      font-size: 13px;
      color: #03C75A;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
    </div>
    <h1>Caify</h1>
    <p class="subtitle">블로그 자동화 앱</p>

    <a id="dlBtn" class="btn" href="https://github.com/caifyhelp-cmyk/caify-product/releases/latest/download/caify.apk">
      APK 다운로드 및 설치
    </a>
    <p class="downloading" id="dlMsg">다운로드 중... 완료되면 하단 <b>열기</b>를 탭하세요</p>

    <div class="steps">
      <p class="steps-title">설치 방법</p>
      <div class="step">
        <div class="step-num">1</div>
        <div class="step-text">위 버튼을 눌러 APK를 다운로드합니다</div>
      </div>
      <div class="step">
        <div class="step-num">2</div>
        <div class="step-text">화면 상단 알림창에서 <b>다운로드 완료</b>를 탭합니다</div>
      </div>
      <div class="step">
        <div class="step-num">3</div>
        <div class="step-text"><b>"설치"</b>를 눌러 앱을 설치합니다</div>
      </div>
      <div class="step">
        <div class="step-num">4</div>
        <div class="step-text">설치 완료 후 <b>"열기"</b>를 눌러 실행합니다</div>
      </div>
    </div>

    <div class="notice">
      ⚠️ "출처를 알 수 없는 앱" 경고가 뜨면<br>
      <b>허용</b>을 눌러주세요. Caify 공식 앱입니다.
    </div>
  </div>

  <script>
    document.getElementById('dlBtn').addEventListener('click', function() {
      document.getElementById('dlMsg').style.display = 'block';
    });
  </script>
</body>
</html>
