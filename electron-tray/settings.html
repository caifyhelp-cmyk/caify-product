<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Caify 설정</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Malgun Gothic', sans-serif;
      background: #f5f5f5;
      padding: 24px;
      color: #333;
    }
    h2 { font-size: 18px; margin-bottom: 20px; color: #1a73e8; }
    .section { background: #fff; border-radius: 8px; padding: 18px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.1); }
    .section h3 { font-size: 13px; color: #666; margin-bottom: 12px; text-transform: uppercase; letter-spacing: .5px; }
    label { display: block; font-size: 13px; margin-bottom: 4px; color: #555; }
    input {
      width: 100%; padding: 8px 10px; border: 1px solid #ddd;
      border-radius: 5px; font-size: 14px; margin-bottom: 12px;
    }
    input:focus { outline: none; border-color: #1a73e8; }
    .btn {
      display: inline-block; padding: 9px 18px; border: none;
      border-radius: 5px; font-size: 14px; cursor: pointer;
    }
    .btn-primary { background: #1a73e8; color: #fff; }
    .btn-primary:hover { background: #1558b0; }
    .btn-secondary { background: #eee; color: #333; margin-left: 8px; }
    .btn-secondary:hover { background: #ddd; }
    #status {
      margin-top: 12px; font-size: 13px; padding: 8px 12px;
      border-radius: 5px; display: none;
    }
    .ok  { background: #e6f4ea; color: #137333; }
    .err { background: #fce8e6; color: #c5221f; }
  </style>
</head>
<body>
  <h2>⚙️ Caify 발행 도우미 설정</h2>

  <div class="section">
    <h3>서버 연결</h3>
    <label>API 주소</label>
    <input id="apiBase" type="text" placeholder="http://localhost:4000" />
    <label>회원 ID (member_pk)</label>
    <input id="memberId" type="text" placeholder="123" />
    <label>API 토큰 (선택)</label>
    <input id="apiToken" type="password" placeholder="Bearer token (없으면 비워두세요)" />
  </div>

  <div style="display:flex; gap:8px;">
    <button class="btn btn-primary" onclick="save()">저장</button>
    <button class="btn btn-secondary" onclick="testConn()">연결 테스트</button>
  </div>
  <div id="status"></div>

  <script>
    const $ = id => document.getElementById(id);

    window.onload = async () => {
      const cfg = await window.caify.getConfig();
      $('apiBase').value  = cfg.apiBase  || '';
      $('memberId').value = cfg.memberId || '';
      $('apiToken').value = cfg.apiToken || '';
    };

    async function save() {
      const cfg = {
        apiBase:  $('apiBase').value.trim().replace(/\/$/, ''),
        memberId: $('memberId').value.trim(),
        apiToken: $('apiToken').value.trim()
      };
      const r = await window.caify.setConfig(cfg);
      showStatus(r.ok ? '저장 완료!' : '저장 실패', r.ok);
    }

    async function testConn() {
      const cfg = {
        apiBase:  $('apiBase').value.trim().replace(/\/$/, ''),
        memberId: $('memberId').value.trim(),
        apiToken: $('apiToken').value.trim()
      };
      showStatus('연결 중...', true);
      const r = await window.caify.testConnection(cfg);
      if (r.ok) {
        showStatus(`✅ 연결 성공 (HTTP ${r.status})`, true);
      } else {
        showStatus(`❌ 연결 실패: ${r.error || 'HTTP ' + r.status}\n${r.body || ''}`, false);
      }
    }

    function showStatus(msg, ok) {
      const el = $('status');
      el.textContent = msg;
      el.className   = ok ? 'ok' : 'err';
      el.style.display = 'block';
    }
  </script>
</body>
</html>
