# ============================================================
# Caify 앱 API nginx URL 라우팅 설정
# /etc/nginx/sites-available/caify.ai (또는 vhost conf) 에 포함
#
# 전제: PHP 파일들이 /usr/share/nginx/html/api/ 에 위치
#       fastcgi_pass 127.0.0.1:9000 (php-fpm)
# ============================================================

server {
    listen 80;
    listen 443 ssl;
    server_name caify.ai www.caify.ai;

    root /usr/share/nginx/html;
    index index.php index.html;

    # SSL (기존 설정 유지)
    # ssl_certificate     ...;
    # ssl_certificate_key ...;

    # 업로드 파일 정적 서빙
    location /uploads/ {
        alias /usr/share/nginx/html/uploads/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # ── 앱 API 라우팅 ────────────────────────────────────────

    # 로그인
    location = /member/login {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME /usr/share/nginx/html/api/app_login.php;
        include fastcgi_params;
    }

    # 내 정보
    location = /member/me {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME /usr/share/nginx/html/api/app_me.php;
        include fastcgi_params;
    }

    # 메시지 (채팅)
    location ~ ^/api/messages(/.*)?$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME /usr/share/nginx/html/api/app_messages.php;
        fastcgi_param REQUEST_URI $request_uri;
        include fastcgi_params;
    }

    # 워크플로우
    location ~ ^/api/workflow(/.*)?$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME /usr/share/nginx/html/api/app_workflow.php;
        fastcgi_param REQUEST_URI $request_uri;
        include fastcgi_params;
    }

    # 사례 제출/조회
    location ~ ^/api/case(/.*)?$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME /usr/share/nginx/html/api/app_case.php;
        fastcgi_param REQUEST_URI $request_uri;
        include fastcgi_params;
        client_max_body_size 50m;
    }

    # 산출물 목록
    location = /api/outputs {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME /usr/share/nginx/html/api/app_outputs.php;
        include fastcgi_params;
    }

    # 포스팅 목록 / 발행완료 / 실패
    location ~ ^/api/posts(/.*)?$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME /usr/share/nginx/html/api/app_posts.php;
        fastcgi_param REQUEST_URI $request_uri;
        include fastcgi_params;
    }

    # 발행 처리 (Electron tray 전용)
    location ~ ^/api/publish(/.*)?$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME /usr/share/nginx/html/api/app_publish.php;
        fastcgi_param REQUEST_URI $request_uri;
        include fastcgi_params;
    }

    # 네이버 블로그 ID
    location = /api/naver-blog {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME /usr/share/nginx/html/api/app_naver_blog.php;
        include fastcgi_params;
    }

    # 블로그 순위 조회/크롤링
    location ~ ^/api/rank(/.*)?$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME /usr/share/nginx/html/api/app_rank.php;
        fastcgi_param REQUEST_URI $request_uri;
        include fastcgi_params;
    }

    # n8n → ai_posts 저장 엔드포인트
    location = /api {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME /usr/share/nginx/html/api/index.php;
        include fastcgi_params;
    }

    # 기존 PHP 파일 직접 접근 (관리자 등)
    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
